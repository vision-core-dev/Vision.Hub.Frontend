<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://vcore.b-cdn.net/public/VisionCoreDev/small/light/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Primary font: preloaded for fast first paint -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- Secondary fonts: non-blocking (loaded async) -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">

    <meta property="og:title" content="Vision Core Hub">
    <meta property="og:description" content="Центр управління процесами та роботою команди Vision Core Dev.">
    <meta property="og:image" content="https://cdn.visioncore.dev/public/VisionCoreHub/embed.jpg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vision Core Hub">
    <meta name="twitter:description" content="Центр управління процесами та роботою команди Vision Core Dev.">
    <meta name="twitter:image" content="https://cdn.visioncore.dev/public/VisionCoreHub/embed.jpg">

    <title>Vision Core Hub</title>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('theme');
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark-mode');
                } else {
                    document.documentElement.classList.remove('dark-mode');
                }
            } catch (e) { }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
